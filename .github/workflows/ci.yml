name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov
        pip install -r services/anomaly-detection/requirements.txt
        pip install -r services/ai-incident-agent/requirements.txt

    - name: Run Pytest Evaluation Suite
      env:
        OPENAI_API_KEY: "mock-key-for-tests"
      run: |
        pytest tests/ -v --cov=services --cov-report=xml

    # CI Gating based on evaluation metrics
    # In a real workflow, we'd use an evaluation framework to run against a historical dataset
    - name: Verify Evaluation Gating
      run: |
        echo "Validating detection precision > 90%..."
        echo "Validating root cause accuracy > 70%..."
        echo "Validating response time < 3m..."
        # Simulated check passing
        exit 0

  build-and-push:
    needs: test-and-evaluate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build & Push Telemetry Collector
      run: |
        docker build -t incident-engineer/telemetry-collector:latest services/telemetry-collector
        # docker push incident-engineer/telemetry-collector:latest
        
    - name: Build & Push Anomaly Detection
      run: |
        docker build -t incident-engineer/anomaly-detection:latest services/anomaly-detection
        # docker push incident-engineer/anomaly-detection:latest
        
    - name: Build & Push AI Agent
      run: |
        docker build -t incident-engineer/ai-incident-agent:latest services/ai-incident-agent
        # docker push incident-engineer/ai-incident-agent:latest
        
    - name: Build & Push Dashboard
      run: |
        docker build -t incident-engineer/dashboard:latest frontend
        # docker push incident-engineer/dashboard:latest
