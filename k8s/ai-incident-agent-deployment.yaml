apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-incident-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-incident-agent
  template:
    metadata:
      labels:
        app: ai-incident-agent
    spec:
      containers:
      - name: ai-incident-agent
        image: incident-engineer/ai-incident-agent:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: incident-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: ai-incident-agent
spec:
  selector:
    app: ai-incident-agent
  ports:
  - port: 8000
    targetPort: 8000
