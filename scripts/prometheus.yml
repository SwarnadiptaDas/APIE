# Prometheus configuration for Autonomous Incident Engineer
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'telemetry-collector'
    static_configs:
      - targets: ['telemetry-collector:8001']
    metrics_path: /health

  - job_name: 'anomaly-detection'
    static_configs:
      - targets: ['anomaly-detection:8002']
    metrics_path: /health

  - job_name: 'ai-incident-agent'
    static_configs:
      - targets: ['ai-incident-agent:8000']
    metrics_path: /health
